<div class="chatbot-container" *ngIf="isUser; else notLoggedIn">
  <div class="chat-fab-wrapper" tabindex="0">
    <button
      class="chat-fab"
      (click)="toggleChat()"
      title="Toggle chat"
      aria-label="Toggle chat window"
    >
      <i class="fas fa-robot" aria-hidden="true"></i>
    </button>
    <span class="fab-tooltip" role="status" aria-hidden="true"
      >Chat (Ctrl/Cmd+K)</span
    >
  </div>

  <div class="chat-window" [class.open]="isOpen">
    <div class="chat-header">
      <div class="header-title">
        <h5>Library Assistant 📚</h5>
        <small>Powered by AI & RAG</small>
      </div>
      <div class="header-actions" role="toolbar" aria-label="Chat actions">
        <button
          class="btn-action"
          (click)="toggleTts()"
          [class.active]="ttsEnabled"
          [disabled]="!ttsSupported"
          title="Đọc trả lời (TTS)"
          aria-label="Toggle text to speech"
        >
          <i
            class="fas"
            [ngClass]="ttsEnabled ? 'fa-volume-up' : 'fa-volume-mute'"
            aria-hidden="true"
          ></i>
        </button>
        <button
          class="btn-action"
          (click)="replayLastAnswer()"
          [disabled]="!ttsSupported"
          title="Nghe lại trả lời cuối"
          aria-label="Replay last answer"
        >
          <i class="fas fa-rotate-right" aria-hidden="true"></i>
        </button>
        <div class="header-ctrls d-flex align-items-center" aria-hidden="false">
          <button
            class="btn-action"
            (click)="clearChat()"
            title="Clear chat"
            *ngIf="messages.length > 1"
            aria-label="Clear chat history"
          >
            <i class="fas fa-trash-alt" aria-hidden="true"></i>
          </button>
          <button
            class="btn-close ms-2"
            (click)="toggleChat()"
            aria-label="Close chat"
          ></button>
        </div>
      </div>
    </div>

    <div class="chat-body" #chatBody>
      <div
        *ngFor="let message of messages"
        class="message"
        [ngClass]="message.author"
      >
        <div class="message-content">
          <ng-container *ngIf="message.author === 'bot'; else userMessage">
            <markdown [data]="message.text"></markdown>
            <div class="feedback-row" *ngIf="message.author === 'bot'">
              <button
                type="button"
                class="feedback-btn"
                [class.selected]="message.feedback === 'up'"
                (click)="sendFeedback(message, true)"
                [disabled]="message.feedbackSent"
                title="Hữu ích"
                aria-label="Mark answer helpful"
              >
                👍
              </button>
              <button
                type="button"
                class="feedback-btn"
                [class.selected]="message.feedback === 'down'"
                (click)="sendFeedback(message, false)"
                [disabled]="message.feedbackSent"
                title="Chưa ổn"
                aria-label="Mark answer not helpful"
              >
                👎
              </button>
            </div>

            <!-- Book Card for interactive responses -->
            <div class="book-card" *ngIf="message.bookCard">
              <div class="book-card-image">
                <img
                  [src]="
                    message.bookCard.imageUrl || 'assets/books/default-book.png'
                  "
                  [alt]="message.bookCard.title"
                  onerror="this.src = 'assets/books/default-book.png'"
                />
              </div>
              <div class="book-card-info">
                <h6 class="book-title">{{ message.bookCard.title }}</h6>
                <p class="book-author">{{ message.bookCard.author }}</p>
                <div class="book-card-actions">
                  <button
                    class="btn-borrow"
                    (click)="borrowBook(message.bookCard.id)"
                    [disabled]="!message.bookCard.available"
                  >
                    <i class="fas fa-book"></i>
                    {{ message.bookCard.available ? "Mượn ngay" : "Hết sách" }}
                  </button>
                  <button
                    class="btn-details"
                    (click)="viewBookDetails(message.bookCard.id)"
                  >
                    <i class="fas fa-info-circle"></i>
                    Chi tiết
                  </button>
                </div>
              </div>
            </div>
          </ng-container>
          <ng-template #userMessage>
            <p>{{ message.text }}</p>
          </ng-template>
          <small class="timestamp" *ngIf="message.timestamp">
            {{ message.timestamp | date: "short" }}
          </small>
        </div>
      </div>
      <div *ngIf="isLoading" class="message bot">
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <div
        class="quick-replies"
        *ngIf="quickReplies.length && !isLoading"
        role="list"
      >
        <button
          class="chip"
          *ngFor="let chip of quickReplies | slice: 0 : 5"
          (click)="fillMessage(chip)"
          aria-label="Quick reply: {{ chip }}"
          role="listitem"
        >
          {{ chip }}
        </button>
      </div>
    </div>

    <div class="chat-footer">
      <form
        (ngSubmit)="sendMessage()"
        role="form"
        aria-label="Send message form"
      >
        <input
          type="text"
          [(ngModel)]="currentMessage"
          name="currentMessage"
          placeholder="Hỏi về sách, tác giả, thể loại..."
          [disabled]="isLoading"
          autocomplete="off"
          aria-label="Message input"
        />
        <button
          type="button"
          class="btn-voice"
          (click)="toggleVoiceInput()"
          [class.listening]="isListening"
          [disabled]="isLoading"
          *ngIf="voiceSupported"
          title="Nhập bằng giọng nói"
          aria-label="Voice input toggle"
        >
          <i
            class="fas"
            [ngClass]="isListening ? 'fa-stop-circle' : 'fa-microphone'"
            aria-hidden="true"
          ></i>
        </button>
        <button
          type="submit"
          [disabled]="isLoading || !currentMessage.trim()"
          aria-label="Send message"
        >
          <i class="fas fa-paper-plane" aria-hidden="true"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<ng-template #notLoggedIn></ng-template>
