<div class="google-callback-container">
  <div class="text-center py-5">
    <div *ngIf="loading && !error" class="loading-state">
      <div class="spinner-border text-primary mb-3" role="status">
        <span class="visually-hidden">Đang xử lý...</span>
      </div>
      <h4>Đang xác thực với Google...</h4>
      <p class="text-muted">Vui lòng chờ trong giây lát</p>
    </div>

    <div *ngIf="error" class="error-state">
      <i class="fas fa-exclamation-circle text-danger fa-3x mb-3"></i>
      <h4 class="text-danger">{{ error }}</h4>
      <p class="text-muted">Đang chuyển hướng về trang đăng nhập...</p>
    </div>
  </div>
</div>
