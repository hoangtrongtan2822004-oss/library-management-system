<main class="auth">
  <div class="auth-bg" aria-hidden="true"></div>

  <section class="auth-card card">
    <div class="auth-logo" aria-hidden="true">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <defs>
          <linearGradient id="lg" x1="0" x2="1">
            <stop offset="0" stop-color="#34d399" />
            <stop offset="1" stop-color="#06b6d4" />
          </linearGradient>
        </defs>
        <rect
          x="2"
          y="4"
          width="20"
          height="16"
          rx="3"
          fill="rgba(255,255,255,0.04)"
          stroke="url(#lg)"
          stroke-width="1"
        />
        <path
          d="M6 8h12M6 12h12M6 16h8"
          stroke="url(#lg)"
          stroke-width="1.4"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>
    <h1>Đăng nhập</h1>
    <p class="subtitle">Chào mừng trở lại! Vui lòng đăng nhập để tiếp tục.</p>

    <form (ngSubmit)="onSubmit(f)" #f="ngForm" novalidate autocomplete="off">
      <!-- Hiển thị lỗi từ backend nếu có -->
      <div *ngIf="error" class="alert alert-danger mb-3">
        <i class="fa fa-exclamation-circle mr-1"></i> {{ error }}
      </div>

      <div class="field">
        <label for="username">Tên đăng nhập</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          #userNameInput="ngModel"
          [class.is-invalid]="userNameInput.invalid && userNameInput.touched"
          placeholder="Nhập tên đăng nhập của bạn"
        />
        <!-- Validation message -->
        <div
          *ngIf="userNameInput.invalid && userNameInput.touched"
          class="invalid-feedback"
        >
          Vui lòng nhập tên đăng nhập.
        </div>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          #passInput="ngModel"
          [class.is-invalid]="passInput.invalid && passInput.touched"
          placeholder="Nhập mật khẩu của bạn"
        />
        <div
          *ngIf="passInput.invalid && passInput.touched"
          class="invalid-feedback"
        >
          Vui lòng nhập mật khẩu.
        </div>
      </div>

      <div class="actions">
        <label class="remember">
          <input type="checkbox" [(ngModel)]="remember" name="remember" />
          <span>Ghi nhớ tôi</span>
        </label>
        <a class="link" routerLink="/forgot-password">Quên mật khẩu?</a>
      </div>

      <!-- Nút bấm có trạng thái loading -->
      <button
        class="btn btn-block"
        type="submit"
        [disabled]="f.invalid || loading"
      >
        <span
          *ngIf="loading"
          class="spinner-border spinner-border-sm mr-1"
        ></span>
        {{ loading ? "Đang xử lý..." : "Đăng nhập" }}
      </button>

      <p class="small-note text-muted mt-2">
        Bằng cách đăng nhập, bạn đồng ý với
        <a routerLink="/terms">Điều khoản</a> và
        <a routerLink="/privacy">Chính sách bảo mật</a>.
      </p>

      <!-- Divider -->
      <div class="or-divider">
        <span>hoặc</span>
      </div>

      <!-- Google Login Button -->
      <div class="google-signin-wrapper">
        <asl-google-signin-button
          class="google-btn"
          type="standard"
          size="large"
          text="continue_with"
          shape="rectangular"
          theme="filled_blue"
        ></asl-google-signin-button>
      </div>

      <!-- Liên kết sang trang Đăng ký -->
      <div class="text-center mt-3">
        <p class="small text-muted">
          Chưa có tài khoản?
          <a routerLink="/register" class="link">Đăng ký ngay</a>
        </p>
      </div>
    </form>
  </section>
</main>
