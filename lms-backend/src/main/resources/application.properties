# Server Port Configuration
# Allows Render/Heroku to assign dynamic port via $PORT env variable
# Falls back to 8080 for local development
server.port=${PORT:8080}

# Base (prod-safe) settings. Prefer overriding via env or profile-specific files.

# MySQL DataSource Properties
spring.datasource.url=${DB_URL:jdbc:mysql://address=(protocol=tcp)(host=127.0.0.1)(port=3306)/lms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

# JPA / Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.defer-datasource-initialization=true
# Disable SQL init by default; enable in dev profile if you need data.sql
spring.sql.init.mode=never

# JWT (provide env APP_JWT_SECRET in prod; fallback for local dev)
app.jwt-secret=${APP_JWT_SECRET:5v8q/3L+9d1K+X0zR1p6gN8/2q3r4s5t6u7v8w9x0y1=}
app.jwt-expiration=604800000

# Logging (prod-safe defaults; verbose logs live in application-dev.properties)
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.security=INFO
logging.level.com.ibizabroker.lms=INFO
logging.file.name=logs/application.log

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google Gemini API Key (used for chatbot RAG)
gemini.api.key=${GEMINI_API_KEY:}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Rate limiting (optional overrides)
# chat.rate.window-millis=60000
# chat.rate.max-requests=10

# ========================================
# 🚀 ENTERPRISE CONFIGURATION (Added 2026)
# ========================================

# Async ThreadPool Configuration
app.async.core-pool-size=4
app.async.max-pool-size=8
app.async.queue-capacity=200

# Redis Cache TTL (in minutes)
app.cache.default-ttl=5
app.cache.book-details-ttl=10
app.cache.featured-books-ttl=10
app.cache.suggestions-ttl=3
app.cache.system-settings-ttl=30

# API Server URLs (for Swagger/OpenAPI)
app.api.dev-url=http://localhost:8080
app.api.prod-url=https://api.lms.com

# CORS (comma-separated origins)
# Production: Vercel frontend + Local development
allowed.origins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,https://library-management-frontend-pearl.vercel.app}
