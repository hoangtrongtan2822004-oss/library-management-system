# Test properties for unit tests
# Use a Base64-encoded secret that decodes to 32 ASCII bytes (for JwtUtil tests)
app.jwt-secret=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
app.jwt-expiration=3600000
# Disable executing data.sql during tests (H2 does not support MySQL-specific statements like USE)
spring.sql.init.mode=never
spring.datasource.initialization-mode=never
# Test profile: use H2 in-memory DB for integration tests (no MySQL required)

# H2 DataSource
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Disable external dependencies for tests
gemini.api.key=test-key-not-used
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging (quieter for tests)
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.ibizabroker.lms=INFO
