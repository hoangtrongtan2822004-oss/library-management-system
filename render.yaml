services:
  - type: web
    name: lms-backend
    env: docker
    dockerfilePath: ./lms-backend/Dockerfile
    dockerContext: ./lms-backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # DB_URL is preferred by application-prod.properties
      # Render will inject the database connection string from managed Postgres.
      - key: DB_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: lms-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: lms-db
          property: password
      - key: DB_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

      - key: APP_JWT_SECRET
        generateValue: true

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: REDIS_HOST
        fromService:
          type: redis
          name: lms-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: lms-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: lms-redis
          property: password

      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC

      # Optional integrations: set these in Render dashboard if needed.
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: redis
    name: lms-redis
    ipAllowList: []
    plan: free

databases:
  - name: lms-db
    databaseName: lms_db
    user: lms_user
    plan: free
