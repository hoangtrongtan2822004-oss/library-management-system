services:
  - type: web
    name: lms-backend
    env: docker
    dockerfilePath: ./lms-backend/Dockerfile
    dockerContext: ./lms-backend
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # External database (Neon/Supabase/etc.)
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

      - key: APP_JWT_SECRET
        generateValue: true

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # External Redis (Upstash/Redis Cloud/etc.)
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: SPRING_DATA_REDIS_URL
        sync: false

      # Optional manual override if your Redis plan requires explicit password env.
      - key: REDIS_PASSWORD
        sync: false

      - key: JAVA_OPTS
        value: -Xms256m -Xmx512m -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC

      # Optional integrations: set these in Render dashboard if needed.
      - key: GEMINI_API_KEY
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
